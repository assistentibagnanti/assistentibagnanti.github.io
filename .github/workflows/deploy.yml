name: Deploy sito (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permessi necessari al deploy su GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola esecuzione di deploy alla volta
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Build del sito (strict)
        run: mkdocs build --strict

      - name: Configura Pages
        uses: actions/configure-pages@v5

      - name: Carica artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
